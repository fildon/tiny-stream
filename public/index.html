<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tiny-stream</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── Landing: pick your role ────────────────────────────────────── -->
    <div id="landing" class="screen">
      <h1>tiny-stream</h1>
      <p class="subtitle">One-way video streaming across your devices</p>

      <div class="room-input">
        <label for="roomInput">Room name</label>
        <input
          id="roomInput"
          type="text"
          value="home"
          placeholder="e.g. home"
          autocomplete="off"
        />
      </div>

      <div class="role-buttons">
        <button id="btnSend" class="btn btn-send">
          <span class="icon">📷</span>
          Send Video
          <span class="hint">Camera → network</span>
        </button>
        <button id="btnReceive" class="btn btn-receive">
          <span class="icon">📺</span>
          Receive Video
          <span class="hint">Watch the stream</span>
        </button>
      </div>

      <div id="qrSection" class="qr-section hidden">
        <div class="qr-divider">
          <span>or scan to connect from another device</span>
        </div>
        <div id="qrCode" class="qr-code"></div>
        <p id="qrUrl" class="qr-url"></p>
      </div>
    </div>

    <!-- ── Sender screen ──────────────────────────────────────────────── -->
    <div id="sender" class="screen hidden">
      <div class="topbar">
        <span class="badge badge-send">SENDING</span>
        <span id="senderRoom" class="room-label"></span>
        <button id="btnStopSend" class="btn-small">✕ Stop</button>
      </div>
      <div class="video-wrap" id="senderVideoWrap">
        <video id="localVideo" autoplay playsinline muted></video>
        <button
          id="btnFullscreenSend"
          class="btn-fullscreen"
          title="Toggle fullscreen"
        >
          ⛶
        </button>
        <div class="connection-overlay hidden" id="senderOverlay">
          <div class="connection-overlay-content">
            <div class="overlay-spinner"></div>
            <p class="overlay-msg">Connection lost</p>
            <p class="overlay-sub">Waiting for viewers…</p>
          </div>
        </div>
      </div>
      <div id="senderStatus" class="status">Initializing camera…</div>
      <div class="camera-select-wrap">
        <label for="cameraSelect">Camera:</label>
        <select id="cameraSelect"></select>
      </div>
    </div>

    <!-- ── Receiver screen ────────────────────────────────────────────── -->
    <div id="receiver" class="screen hidden">
      <div class="topbar">
        <span class="badge badge-recv">WATCHING</span>
        <span id="receiverRoom" class="room-label"></span>
        <button id="btnStopRecv" class="btn-small">✕ Stop</button>
      </div>
      <div class="video-wrap" id="receiverVideoWrap">
        <video id="remoteVideo" autoplay playsinline></video>
        <button
          id="btnFullscreenRecv"
          class="btn-fullscreen"
          title="Toggle fullscreen"
        >
          ⛶
        </button>
        <div class="connection-overlay hidden" id="receiverOverlay">
          <div class="connection-overlay-content">
            <div class="overlay-spinner"></div>
            <p class="overlay-msg">Connection lost</p>
            <p class="overlay-sub">Waiting for sender…</p>
          </div>
        </div>
      </div>
      <div id="receiverStatus" class="status">Waiting for sender…</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
